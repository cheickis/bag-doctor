<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bag Doctor — Robot Failure Investigation</title>
  <style>
    :root { color-scheme: dark; --ink:#eff6ff; --muted:#91a4b7; --panel:#111c27; --line:#243849; --cyan:#42d9c8; --amber:#ffb454; --red:#ff6b6b; }
    * { box-sizing:border-box } body { margin:0; min-height:100vh; background:radial-gradient(circle at 15% 0,#163343 0,transparent 34%),#081018; color:var(--ink); font:15px/1.55 Inter,ui-sans-serif,system-ui,sans-serif; }
    main { width:min(1100px,calc(100% - 36px)); margin:auto; padding:64px 0 80px; }
    header { display:flex; justify-content:space-between; gap:32px; align-items:end; margin-bottom:38px; }
    .eyebrow { color:var(--cyan); font-weight:750; text-transform:uppercase; letter-spacing:.14em; font-size:12px; }
    h1 { font-size:clamp(38px,7vw,70px); line-height:.98; letter-spacing:-.05em; margin:9px 0 14px; } header p { color:var(--muted); max-width:600px; margin:0; font-size:17px; }
    button { border:0; border-radius:11px; padding:14px 19px; background:var(--cyan); color:#06211e; font:700 14px inherit; cursor:pointer; white-space:nowrap; box-shadow:0 12px 35px #42d9c830; } button:hover { transform:translateY(-1px); } button:disabled { opacity:.55; cursor:wait; }
    .hidden { display:none!important } .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:24px 0; }
    .metric,.panel,.incident { background:#111c27dd; border:1px solid var(--line); border-radius:14px; }
    .metric { padding:18px; } .metric span { display:block; color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; } .metric strong { font-size:24px; }
    .panel { overflow:hidden; } .panel h2 { margin:0; padding:20px 22px; font-size:16px; border-bottom:1px solid var(--line); }
    table { width:100%; border-collapse:collapse; } th,td { padding:15px 22px; text-align:left; border-bottom:1px solid var(--line); } th { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.08em; } tr:last-child td { border:0; }
    .status { display:inline-flex; align-items:center; gap:7px; } .dot { width:8px; height:8px; border-radius:50%; background:var(--cyan); } .bad .dot { background:var(--red); box-shadow:0 0 10px #ff6b6b88; }
    .incident { margin-top:18px; padding:22px; border-color:#7e5030; background:linear-gradient(120deg,#2a1e18,#111c27); display:flex; align-items:center; gap:18px; } .incident-icon { display:grid; place-items:center; width:44px; height:44px; border-radius:50%; background:#ffb45420; color:var(--amber); font-size:22px; } .incident h3 { margin:0 0 2px; } .incident p { margin:0; color:#c9b19a; }
    #error { color:#ff9494; margin-top:18px; } footer { margin-top:32px; color:#64788b; font-size:12px; }
    @media(max-width:760px){ header{align-items:start;flex-direction:column}.grid{grid-template-columns:repeat(2,1fr)}th:nth-child(2),td:nth-child(2){display:none}th,td{padding:13px 12px} }
  </style>
</head>
<body><main>
  <header><div><div class="eyebrow">Deterministic diagnostics</div><h1>Bag Doctor</h1><p>Turn robot recordings into measured, evidence-backed failure investigations.</p></div><button id="analyze">Analyze Failed Robot Demo</button></header>
  <section id="results" class="hidden">
    <div class="grid" id="summary"></div>
    <div class="panel"><h2>Topic health</h2><table><thead><tr><th>Topic</th><th>Type</th><th>Messages</th><th>Median rate</th><th>Max gap</th><th>Status</th></tr></thead><tbody id="topics"></tbody></table></div>
    <div id="incidents"></div>
  </section>
  <div id="error"></div><footer>Measurements are derived directly from MCAP connection metadata and timestamps.</footer>
</main><script>
const button=document.querySelector('#analyze'),results=document.querySelector('#results'),error=document.querySelector('#error');
const fmt=n=>Number(n).toFixed(2);
button.addEventListener('click',async()=>{button.disabled=true;button.textContent='Analyzing timestamps…';error.textContent='';try{
  const response=await fetch('/api/analyze/demo'); if(!response.ok)throw new Error(`Analysis failed (${response.status})`); const data=await response.json();
  document.querySelector('#summary').innerHTML=[['Duration',`${fmt(data.summary.duration_seconds)} s`],['Topics',data.summary.topic_count],['Messages',data.summary.total_messages.toLocaleString()],['Format',data.summary.storage_format.toUpperCase()]].map(([k,v])=>`<div class="metric"><span>${k}</span><strong>${v}</strong></div>`).join('');
  document.querySelector('#topics').innerHTML=data.topics.map(t=>`<tr><td><strong>${t.topic}</strong></td><td>${t.message_type}</td><td>${t.message_count}</td><td>${t.median_rate_hz?fmt(t.median_rate_hz)+' Hz':'—'}</td><td>${t.maximum_gap_seconds?fmt(t.maximum_gap_seconds)+' s':'—'}</td><td><span class="status ${t.silence_windows.length?'bad':''}"><i class="dot"></i>${t.silence_windows.length?'Incident':'Healthy'}</span></td></tr>`).join('');
  document.querySelector('#incidents').innerHTML=data.incidents.map(i=>`<article class="incident"><div class="incident-icon">!</div><div><h3>Silence detected on ${i.topic}</h3><p>No messages for ${fmt(i.duration_seconds)} seconds, from t+${fmt(i.start_seconds)}s to t+${fmt(i.end_seconds)}s. Expected period: ${fmt(i.expected_period_seconds)}s.</p></div></article>`).join(''); results.classList.remove('hidden');
}catch(e){error.textContent=e.message}finally{button.disabled=false;button.textContent='Analyze Again'}});
</script></body></html>
